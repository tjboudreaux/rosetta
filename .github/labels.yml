# Issue/PR label taxonomy — the source of truth, mirrored to GitHub via `gh label create`
# (there is no auto-sync workflow). Beyond GitHub's default set, priority:* and area:* give
# triage + routing signal (RA1 taskdisc.issue_labeling); areas mirror AGENTS.md.
- name: "priority: critical"
  color: "b60205"
  description: "Drop everything — broken core flow, data loss, or release blocker."
- name: "priority: high"
  color: "d93f0b"
  description: "Important; schedule soon."
- name: "priority: low"
  color: "0e8a16"
  description: "Nice to have; no deadline."
- name: "area: collector"
  color: "1d76db"
  description: "Transcript resolvers/parsers and discovery (collect.py)."
- name: "area: decisions"
  color: "1d76db"
  description: "ADR/PDR/BDR records and the decision library (decisions.py)."
- name: "area: gates"
  color: "1d76db"
  description: "Provenance/evidence gates, preflight, drift (gates.py / preflight.py)."
- name: "area: cli"
  color: "1d76db"
  description: "The rosetta_cli dispatcher and command UX."
- name: "area: docs"
  color: "1d76db"
  description: "README, skill docs, and ADRs."
