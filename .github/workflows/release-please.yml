name: release-please

# Automates versioning, CHANGELOG, and GitHub Releases from Conventional Commits
# (the repo already uses `type(scope): subject`). Opens/updates a release PR on each
# push to main; merging it tags the release.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
