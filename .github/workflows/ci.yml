name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Run from skills/rosetta so the `tests` package is importable (loop tests do
    # `from tests._loop_helpers import ...`) and paths match the coverage job + dev docs.
    defaults:
      run:
        working-directory: skills/rosetta
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check (pure stdlib, no deps)
        run: |
          python -m py_compile \
            scripts/collect.py \
            scripts/decisions.py \
            scripts/ingest.py \
            scripts/rosetta \
            rosetta_cli.py \
            evals/adversarial/fixtures.py \
            evals/adversarial/run_evals.py \
            evals/adversarial/report.py

      - name: Unit tests (agent resolvers + parsers, loop CLIs, ingest)
        run: python -m unittest discover -s tests -v

      - name: Validate decision library (with anti-hallucination gate)
        run: python scripts/decisions.py --root decisions validate --integrity

  coverage:
    # Separate job so the matrix test job above stays pure-stdlib (zero deps, per ADR 0013).
    # coverage.py is a CI/dev-only tool; it is not a runtime dependency of the shipped skill.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install coverage
      - name: Coverage gate (fail under 90%)
        working-directory: skills/rosetta
        run: |
          coverage run -m unittest discover -s tests
          coverage report   # fail_under = 90 enforced via .coveragerc
