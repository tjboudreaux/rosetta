<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rosetta — the decision context engine for AI coding agents: reconcile every agent's history into one cited ground truth">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1f"/>
      <stop offset="1" stop-color="#0f1733"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.74" cy="0.5" r="0.72">
      <stop offset="0" stop-color="#1b2a5e" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#1b2a5e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#vignette)"/>
  <g stroke="#222d57" stroke-width="1" opacity="0.4">
    <path d="M0 90 H1280 M0 180 H1280 M0 270 H1280"/>
    <path d="M213 0 V360 M426 0 V360 M639 0 V360 M852 0 V360 M1065 0 V360"/>
  </g>

  <!-- LEFT: wordmark + copy -->
  <text x="66" y="74" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" letter-spacing="4.5" fill="#7f8db9" font-weight="600">A ROSETTA STONE FOR YOUR AGENTS</text>
  <text x="60" y="172" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="98" font-weight="800" fill="url(#brand)" letter-spacing="-2.5">Rosetta</text>
  <text x="66" y="214" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="25" fill="#e2e8ff" font-weight="600">The decision context engine for AI coding agents</text>
  <text x="66" y="246" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="16" fill="#94a0c8">Reconcile every agent's history into one cited ground truth.</text>

  <!-- CTA chip -->
  <rect x="66" y="276" width="436" height="38" rx="9" fill="#0c1432" stroke="#2f3c74"/>
  <circle cx="86" cy="295" r="4.5" fill="#ef6f6f"/><circle cx="101" cy="295" r="4.5" fill="#e7c66b"/><circle cx="116" cy="295" r="4.5" fill="#74d99f"/>
  <text x="136" y="300" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15.5" fill="#8ff0d4">$ npx skills add tjboudreaux/rosetta</text>

  <!-- RIGHT: many transcripts -> one ground truth -->
  <g>
    <g transform="translate(712,64)" opacity="0.7">
      <rect width="156" height="44" rx="8" fill="#131d45" stroke="#2c396f"/>
      <rect width="5" height="44" rx="2.5" fill="#5eead4"/>
      <rect x="18" y="13" width="78" height="5" rx="2.5" fill="#46538f"/><rect x="18" y="26" width="58" height="5" rx="2.5" fill="#3a4677"/>
    </g>
    <g transform="translate(712,116)" opacity="0.85">
      <rect width="156" height="44" rx="8" fill="#131d45" stroke="#2c396f"/>
      <rect width="5" height="44" rx="2.5" fill="#818cf8"/>
      <rect x="18" y="13" width="92" height="5" rx="2.5" fill="#46538f"/><rect x="18" y="26" width="64" height="5" rx="2.5" fill="#3a4677"/>
    </g>
    <g transform="translate(712,168)">
      <rect width="156" height="44" rx="8" fill="#16224f" stroke="#39477f"/>
      <rect width="5" height="44" rx="2.5" fill="#c084fc"/>
      <rect x="18" y="13" width="84" height="5" rx="2.5" fill="#52609d"/><rect x="18" y="26" width="70" height="5" rx="2.5" fill="#414f86"/>
    </g>
    <g transform="translate(712,220)" opacity="0.85">
      <rect width="156" height="44" rx="8" fill="#131d45" stroke="#2c396f"/>
      <rect width="5" height="44" rx="2.5" fill="#38bdf8"/>
      <rect x="18" y="13" width="88" height="5" rx="2.5" fill="#46538f"/><rect x="18" y="26" width="60" height="5" rx="2.5" fill="#3a4677"/>
    </g>
    <g transform="translate(712,272)" opacity="0.7">
      <rect width="156" height="44" rx="8" fill="#131d45" stroke="#2c396f"/>
      <rect width="5" height="44" rx="2.5" fill="#34d399"/>
      <rect x="18" y="13" width="74" height="5" rx="2.5" fill="#46538f"/><rect x="18" y="26" width="54" height="5" rx="2.5" fill="#3a4677"/>
    </g>

    <!-- converging connectors funnel into the node -->
    <g stroke="url(#brand)" stroke-width="2.25" fill="none" opacity="0.85">
      <path d="M868 86  C 968 86, 1015 190, 1090 190"/>
      <path d="M868 138 C 968 138, 1030 190, 1090 190"/>
      <path d="M868 190 H 1090"/>
      <path d="M868 242 C 968 242, 1030 190, 1090 190"/>
      <path d="M868 294 C 968 294, 1015 190, 1090 190"/>
    </g>

    <!-- ground-truth node -->
    <circle cx="1150" cy="190" r="104" fill="url(#glow)"/>
    <circle cx="1150" cy="190" r="60" fill="#0b1330" stroke="url(#brand)" stroke-width="3.5"/>
    <path d="M1127 190 l15 16 l30 -34" stroke="#5eead4" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1150" y="283" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" fill="#cdd7ff">ground-truth.md</text>
    <text x="1150" y="304" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif" font-size="12.5" fill="#8a97c2" letter-spacing="2.5">ADR · PDR · BDR</text>
